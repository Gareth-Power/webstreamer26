<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgo=" />
  <title>SaIL WebAV</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --panel: #ffffff;
      --accent: #2563eb;
      --text: #0f172a;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 9px 19px 19px 19px;
    }

    .wrap {
      width: min(800px, 100%);
      display: grid;
      gap: 14px;
    }

    .logo {
      height: 92px;
      width: auto;
      object-fit: contain;
      display: block;
      margin: 0 auto 18px auto;
    }

    .footer {
      position: fixed;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
    }

    .panel {
      background: linear-gradient(145deg, rgba(255,255,255,0.8), rgba(248,250,252,0.9));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 7px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .viewer-fab {
      position: absolute;
      right: 21px;
      bottom: 20px;
      z-index: 2;
    }

    .btn-ghost {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 120ms ease, box-shadow 120ms ease;
    }

    .btn-ghost:hover { background: #f1f5f9; }

    .viewer-wrap {
      position: relative;
      padding: 7px;
    }

    .viewer {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border: none;
      border-radius: 10px;
      background: #f1f5f9;
      overflow: hidden;
      transform: translateX(0px);
    }

    .qr-box {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      align-items: center;
    }

    .qr-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      object-fit: contain;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.12));
    }

    .mono {
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 13px;
      background: #f8fafc;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--muted);
      word-break: break-all;
    }

    small { color: var(--muted); }

    @media (max-width: 640px) {
      .qr-box { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="SaIL.png" alt="SaIL logo" class="logo" />
    <div class="panel" style="display: grid; gap: 10px;">
      <div class="viewer-wrap">
        <iframe
          id="viewer"
          class="viewer"
          title="Room viewer"
          allow="autoplay *; camera *; microphone *; picture-in-picture *; display-capture *; clipboard-read *; clipboard-write *"
          playsinline
          loading="eager"
        ></iframe>
        <div class="viewer-fab">
          <button id="fsBtn" class="btn-ghost" type="button">Fullscreen</button>
        </div>
      </div>
    </div>

    <div class="panel" style="display: grid; gap: 10px;">
        <div class="qr-box">
          <img id="qr" class="qr-img" alt="Scan to send camera" />
          <div style="display: grid; gap: 6px;">
            <div><small>Camera link</small><div class="mono" id="joinLink">…</div></div>
          </div>
        </div>
      <small>Scan the QR on a phone, allow camera/mic, and the feed will appear in the viewer above.</small>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
  const suppliedRoom = params.get("room");
  // VDO.Ninja requires alphanumeric room codes; 6-char random with r prefix
  const randomCode = Math.random().toString(36).replace(/[^a-z0-9]+/gi, "").slice(2, 8);
  const room = suppliedRoom ? suppliedRoom.replace(/[^a-zA-Z0-9]/g, "") : `r${randomCode}`;
  // Alphanumeric stream ID to avoid landing UI
  const streamId = `${room}cam`;

    if (!suppliedRoom) {
      const next = new URL(window.location.href);
      next.searchParams.set("room", room);
      window.history.replaceState({}, "", next.toString());
    }

    const viewer = document.getElementById("viewer");
    const qr = document.getElementById("qr");
    const joinLinkEl = document.getElementById("joinLink");
    const fsBtn = document.getElementById("fsBtn");

  // Viewer: hide hover controls but keep the big play overlay by using controls=0 (no cleanoutput)
  const viewerUrl = `https://vdo.ninja/?scene&room=${encodeURIComponent(room)}&controls=1&labels=0&stats=0`;
  // Direct room join link for adding devices with desired audio/video params
  // Prevent cameras from seeing other feeds by hiding remote views (view=0)
  // Local join page wrapper (hides vdo.ninja URL) with room param
  const joinPageUrl = new URL("join.html", window.location.href);
  joinPageUrl.searchParams.set("room", room);

  const applyLink = (url) => {
    qr.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
    joinLinkEl.textContent = url;
  };

  // is.gd JSONP shortener; falls back to the original URL on error/timeout.
  const shortenUrl = (url) => new Promise((resolve) => {
    const cb = `isgd_cb_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    const cleanup = () => {
      delete window[cb];
      if (script && script.parentNode) script.parentNode.removeChild(script);
    };
    const script = document.createElement("script");
    window[cb] = (data) => {
      const short = data && data.shorturl;
      resolve(short && short.startsWith("http") ? short : url);
      cleanup();
    };
    script.onerror = () => {
      resolve(url);
      cleanup();
    };
    script.src = `https://is.gd/create.php?format=json&callback=${cb}&url=${encodeURIComponent(url)}`;
    document.body.appendChild(script);
    setTimeout(() => {
      resolve(url);
      cleanup();
    }, 4000);
  });

  viewer.src = viewerUrl;
  const updateFsLabel = () => {
    const active = document.fullscreenElement === viewer || document.fullscreenElement === viewer.parentElement;
    fsBtn.textContent = active ? "Exit fullscreen" : "Fullscreen";
  };

  fsBtn.addEventListener("click", async () => {
    try {
      if (document.fullscreenElement) {
        await document.exitFullscreen();
      } else {
        if (viewer.requestFullscreen) {
          await viewer.requestFullscreen();
        } else if (viewer.parentElement?.requestFullscreen) {
          await viewer.parentElement.requestFullscreen();
        }
      }
    } catch (err) {
      console.warn("Fullscreen toggle failed", err);
    } finally {
      updateFsLabel();
    }
  });

  document.addEventListener("fullscreenchange", updateFsLabel);
  updateFsLabel();
  const joinPageHref = joinPageUrl.toString();
  applyLink(joinPageHref); // show immediately with local URL

  shortenUrl(joinPageHref)
    .then((short) => {
      applyLink(short);
    })
    .catch((err) => {
      console.warn("Shorten failed; using full link", err);
      applyLink(joinPageHref);
    });

  </script>
  <div class="footer">© Gareth Power, Simulation and Interactive Learning, Guy's &amp; St Thomas' NHS Foundation Trust</div>
</body>
</html>
